# ===========================================================
# 博客文章自动抓取 Workflow
# ----------------------------------------------------------
# 直接读取 CSDN 官方 RSS Feed，
# 再由 blog-post-workflow 更新 README
# ===========================================================

name: Latest Blog Posts

on:
  schedule:
    # 每天 UTC 00:00 运行（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

concurrency:
  group: commit-to-main
  cancel-in-progress: false

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CSDN RSS feed
        run: |
          echo "Testing CSDN RSS endpoint..."
          curl -sf "https://rss.csdn.net/2201_75708499/rss/map" | head -c 500
          echo ""
          echo "CSDN RSS feed is ready."

      - name: Update README with latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://rss.csdn.net/2201_75708499/rss/map"
          max_post_count: "5"
          template: "$newline- [$title]($url) — $date"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "docs: update README with latest CSDN blog posts"
