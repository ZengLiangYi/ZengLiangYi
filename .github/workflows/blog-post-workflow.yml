# ===========================================================
# 博客文章自动抓取 Workflow
# ----------------------------------------------------------
# 通过 Docker Compose 启动本地 RSSHub 实例，
# 将掘金文章转为 RSS Feed，再由 blog-post-workflow 更新 README
# ===========================================================

name: Latest Blog Posts

on:
  schedule:
    # 每天 UTC 00:00 运行一次
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start RSSHub via Docker Compose
        run: docker compose up -d --wait
        timeout-minutes: 3

      - name: Verify RSSHub is serving Juejin feed
        run: |
          echo "Testing RSSHub Juejin endpoint..."
          curl -sf "http://localhost:1200/juejin/posts/1669474445171547" | head -c 500
          echo ""
          echo "RSSHub is ready."

      - name: Update README with latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "http://localhost:1200/juejin/posts/1669474445171547"
          max_post_count: "5"
          template: "$newline- [$title]($url) — $date"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "docs: update README with latest Juejin blog posts"

      - name: Stop RSSHub
        if: always()
        run: docker compose down
